<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050712" />
    <script>
      (() => {
        try {
          const savedTheme = window.localStorage.getItem("declan-theme");
          const systemTheme = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
          document.documentElement.dataset.theme =
            savedTheme === "light" || savedTheme === "dark" ? savedTheme : systemTheme;
        } catch {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
    <meta name="description" content="Declan Chan." />
    <meta
      name="keywords"
      content="Declan Chan, social links, GitHub, LinkedIn, Engineering Science, University of Toronto"
    />
    <meta property="og:title" content="Declan Chan" />
    <meta property="og:description" content="Declan Chan." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://declanwhchan.github.io/" />
    <meta property="og:image" content="https://declanwhchan.github.io/assets/logo.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Syne:wght@700;800&display=swap"
